<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Kontrol Panel</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-split-container">
        <div class="login-form-wrapper">
            <h2>Sign In Panel Admin</h2>
            <form id="admin-login-form">
                <div class="form-input-container">
                    <label>Username</label>
                    <input type="text" id="inp-username" placeholder="Masukkan ID admin" required autocomplete="off">
                </div>
                <div class="form-input-container">
                    <label>Password</label>
                    <input type="password" id="inp-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-signin-submit">Masuk ke Dashboard</button>
            </form>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
