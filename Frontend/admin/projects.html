<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Admin - Projects</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/projects.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="admin-frame">
        <aside class="adm-sidebar">
            <div class="sidebar-logo">Velma Control</div>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> Dashboard</a></li>
                <li><a href="profiles.html"><i class="fa-solid fa-user-gear"></i> Profiles</a></li>
                <li><a href="skills.html"><i class="fa-solid fa-graduation-cap"></i> Skills</a></li>
                <li><a href="experience.html"><i class="fa-solid fa-briefcase"></i> Experience</a></li>
                <li class="active"><a href="projects.html"><i class="fa-solid fa-code-branch"></i> Projects</a></li>
                <li class="nav-footer-btn" id="action-logout"><a href="#"><i class="fa-solid fa-power-off"></i> Keluar</a></li>
            </ul>
        </aside>

        <main class="adm-panel">
            <header class="panel-header">
                <h1>Katalog Karya Projek</h1>
                <button class="btn-action-primary" onclick="openProjModal()"><i class="fa-solid fa-plus"></i> Tambah Projek</button>
            </header>

            <div class="project-dashboard-grid" id="projects-admin-grid">
                </div>
        </main>
    </div>

    <div class="modal-backdrop" id="proj-modal">
        <div class="modal-box spec-wide">
            <h2 class="modal-header" id="modal-proj-title">Formulir Isian Projek</h2>
            <form id="form-proj-crud">
                <input type="hidden" id="proj-id">
                <div class="form-group-adm"><label>Judul Projek</label><input type="text" id="pj-judul" required></div>
                <div class="form-group-adm"><label>Tautan Demo (Opsional)</label><input type="url" id="pj-link" placeholder="https://github.com/..."></div>
                <div class="form-group-adm"><label>Deskripsi Solusi Projek</label><textarea id="pj-deskripsi" rows="3" required></textarea></div>
                
                <div class="form-group-adm">
                    <label>Unggah Gambar Banner (Cloudinary Server Integration)</label>
                    <div class="drop-upload-zone" id="drag-drop-zone-click" onclick="document.getElementById('pj-file-file').click()">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size:28px; color:#b87d60; margin-bottom:8px;"></i>
                        <p id="upload-status-label">Klik untuk mengunggah berkas gambar projek</p>
                        <input type="hidden" id="pj-gambar-url">
                        <input type="file" id="pj-file-file" style="display: none;" accept="image/*">
                    </div>
                    <img id="pj-gambar-preview" class="upload-preview" src="" alt="Pratinjau Gambar" style="display:none; width:100%; max-height:220px; object-fit:cover; border-radius:10px; margin-top:12px;" />
                </div>

                <div class="form-group-adm">
                    <label>Atau tempel URL Gambar Cloudinary</label>
                    <input type="url" id="pj-gambar-link" placeholder="https://res.cloudinary.com/....jpg">
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-close-modal" onclick="closeProjModal()">Batal</button>
                    <button type="submit" class="btn-action-primary">Simpan Karya</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/base.js"></script>
    <script src="js/projects.js"></script>
</body>
</html>
